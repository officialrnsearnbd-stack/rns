<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ── Primary SEO ──────────────────────────────────────────────── -->
    <title>RNS — Reach &amp; Network Social | Connect, Share &amp; Chat</title>
    <meta name="description" content="RNS (Reach & Network Social) is a free social platform to share posts, reels, and stories, chat in real time, and build genuine connections with people who matter." />
    <meta name="keywords" content="RNS, Reach Network Social, social media Bangladesh, social app, share posts, reels, stories, chat, connect friends, Bengali social network" />
    <meta name="author" content="Rahat — RNS" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://rns.social/" />

    <!-- ── Open Graph (Facebook / WhatsApp / LinkedIn) ──────────────── -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="RNS" />
    <meta property="og:title" content="RNS — Reach &amp; Network Social" />
    <meta property="og:description" content="Share posts, reels &amp; stories. Chat in real time. Build real connections — join RNS free today." />
    <meta property="og:image" content="https://pmopriymftdnyjbugdut.supabase.co/storage/v1/object/public/images/b519a16b-ad63-4b1e-92bf-fee8c11ef33b/avatar_1778760711186.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://rns.social/" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="bn_BD" />

    <!-- ── Twitter Card ─────────────────────────────────────────────── -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="RNS — Reach &amp; Network Social" />
    <meta name="twitter:description" content="Share posts, reels &amp; stories. Chat in real time. Build real connections — join RNS free today." />
    <meta name="twitter:image" content="https://pmopriymftdnyjbugdut.supabase.co/storage/v1/object/public/images/b519a16b-ad63-4b1e-92bf-fee8c11ef33b/avatar_1778760711186.jpg" />

    <!-- ── Theme / PWA ───────────────────────────────────────────────── -->
    <meta name="theme-color" content="#7c3aed" />
    <meta name="application-name" content="RNS" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="RNS" />

    <!-- ── Structured Data (JSON-LD) ────────────────────────────────── -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "RNS — Reach & Network Social",
      "url": "https://rns.social/",
      "description": "RNS is a free social platform to share posts, reels, and stories, chat in real time, and build genuine connections.",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://rns.social/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      },
      "publisher": {
        "@type": "Organization",
        "name": "RNS",
        "url": "https://rns.social/",
        "logo": {
          "@type": "ImageObject",
          "url": "https://rns.social/favicon.png"
        }
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
